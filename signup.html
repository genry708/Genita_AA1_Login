<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARAL - Sign Up</title>

  <style>
    /* ================= VARIABLES & RESET ================= */
    :root {
      --blue: #1A237E;
      --blue-dark: #283593;
      --yellow: #FFD700;
      --bg-light: #f7f9fb;
      --nav-h: 72px;
      --content-max: 1200px;
      --error-red: #d32f2f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      background: var(--bg-light);
      color: #0b1220;
      line-height: 1.5;
      padding-top: calc(var(--nav-h) + 40px); /* Space for fixed header */
    }

    /* ================= HEADER STYLE ================= */
    .hdr {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--blue);
      display: flex; align-items: center;
      z-index: 2000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .hdr-inner {
      width: 100%; max-width: var(--content-max); margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 0 20px;
    }
    .logo img { height: 48px; width: auto; margin-left: -25px; }

    .navbar { display: flex; gap: 50px; align-items: center; }
    .navbar a {
      color: #fff; text-decoration: none; font-weight: 500; padding: 6px 0;
      transition: color .2s;
    }
    .navbar a:hover,
    .navbar a.active { color: var(--yellow); }

    /* ================= SIGNUP FORM STYLES ================= */
    .signup-wrapper {
      max-width: 600px;
      margin: 0 auto 60px;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }
    .form-title { color: var(--blue); text-align: center; margin-bottom: 25px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--blue-dark); }

    input[type="text"], input[type="email"], input[type="password"], input[type="date"], select {
      width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em;
    }

    /* Event handler style: highlight on focus */
    input:focus { border-color: var(--blue); outline: none; background-color: #f0f4ff; }

    .error-span {
      color: var(--error-red); font-size: 0.85em; display: block;
      margin-top: 5px; min-height: 1.2em;
    }

    .submit-btn {
      width: 100%; padding: 16px; background: var(--blue); color: #fff; border: none;
      border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 10px;
    }
    .submit-btn:hover { background: var(--blue-dark); }

    #successMessage {
      text-align: center; font-weight: bold; color: #2e7d32; margin-top: 20px;
    }

    /* ================= HOMEPAGE LINK STYLE ================= */
    .home-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: var(--blue);
      text-decoration: none;
      font-weight: normal;
    }
    .home-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <!-- ================= HEADER ================= -->
  <header class="hdr">
    <div class="hdr-inner">
      <div class="logo">
        <img src="C:\Users\Ricagen Genita\OneDrive\Documents\ARAL\LiGenita_1QProj_v1\images\aralogo.png" alt="ARAL Logo">
      </div>
      <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="stories.html">Stories</a>
        <a href="getinvolved.html">Get Involved</a>
      </nav>
    </div>
  </header>

  <!-- ================= SIGNUP FORM ================= -->
  <div class="signup-wrapper">
    <h2 class="form-title">Join the Advocacy</h2>

    <form id="signupForm" onsubmit="return validateForm()">
      <!-- Full Name -->
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" onfocus="this.style.backgroundColor='#fff'">
        <span id="nameError" class="error-span"></span>
      </div>

      <!-- Birthdate -->
      <div class="form-group">
        <label for="birthdate">Birthdate</label>
        <input type="date" id="birthdate">
        <span id="dateError" class="error-span"></span>
      </div>

      <!-- Sex -->
      <div class="form-group">
        <label>Sex</label>
        <div>
          <input type="radio" name="sex" value="Male"> Male
          <input type="radio" name="sex" value="Female"> Female
          <input type="radio" name="sex" value="Other"> Other
        </div>
        <span id="sexError" class="error-span"></span>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email">
        <span id="emailError" class="error-span"></span>
      </div>

      <!-- Username -->
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username">
        <span id="userError" class="error-span"></span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password">
        <span id="passError" class="error-span"></span>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm">
        <span id="confirmError" class="error-span"></span>
      </div>

      <!-- Advocacy Focus (Dropdown) -->
      <div class="form-group">
        <label for="topic">Advocacy Focus?</label>
        <select id="topic">
          <option value="rural">Rural Education Support</option>
          <option value="teacher">Teacher Empowerment</option>
          <option value="materials">Localized Learning Materials</option>
        </select>
        <span id="topicError" class="error-span"></span>
      </div>

      <!-- How will you help? (Checkboxes) -->
      <div class="form-group">
        <label>How will you support our mission?</label>
        <input type="checkbox" name="supportType" value="Volunteer"> Volunteer Time
        <input type="checkbox" name="supportType" value="Donate"> Financial Support
        <input type="checkbox" name="supportType" value="Awareness"> Spread Awareness
        <span id="supportError" class="error-span"></span>
      </div>

      <!-- Reflection Question -->
      <div class="form-group">
        <label for="ref">Why do you believe education is light?</label>
        <input type="text" id="ref">
        <span id="refError" class="error-span"></span>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn">Edukasyon ang Liwanag - Join Us!</button>
      <div id="successMessage"></div>

      <!-- Homepage Link -->
      <a href="https://genry708.github.io/LiGenita_2QProj/" class="home-link">Return to Homepage</a>
    </form>
  </div>

  <!-- ================= SCRIPT ================= -->
  <script src="script.js"></script>
</body>
</html>
